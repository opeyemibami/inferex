apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: inferex
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-nodeport
  namespace: inferex
spec:
  type: NodePort
  selector:
    app: vllm
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: inferex
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-nodeport
  namespace: inferex
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
