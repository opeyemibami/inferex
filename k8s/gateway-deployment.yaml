apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: inferex
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: inferex-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: GATEWAY_VLLM_URL
              value: "http://vllm-service:8001"
            - name: GATEWAY_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: inferex-secrets
                  key: GATEWAY_API_KEYS
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
